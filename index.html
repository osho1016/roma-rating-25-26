<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASローマ 採点サイト (2026)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="voter-page" class="container">
        <div class="header-actions">
            <button onclick="showAdminLogin()">管理者画面へ</button>
        </div>
        
        <header>
            <h1>AS ROMA RATINGS</h1>
            <p class="subtitle">試合終了後の選手採点フィードバック</p>
        </header>

        <main>
            <div id="player-list">
                </div>
            
            <div class="submit-area">
                <button id="submit-btn" onclick="submitRatings()">採点を送信する</button>
            </div>
        </main>
    </div>

    <div id="admin-login-page" class="container hidden">
        <div class="header-actions">
            <button onclick="backToVote()">← 投票画面に戻る</button>
        </div>
        <div class="admin-box">
            <h2>管理者ログイン</h2>
            <p>パスワードを入力してください</p>
            <input type="password" id="admin-password" placeholder="PASSWORD">
            <button class="admin-submit-btn" onclick="loginAdmin()">ログイン</button>
        </div>
    </div>

    <div id="admin-view-page" class="container hidden">
        <div class="header-actions">
            <button onclick="logoutAdmin()">ログアウト</button>
        </div>
        
        <header>
            <h2>集計結果（管理者画面）</h2>
            <p class="vote-counter">現在の総投票数: <span id="total-votes">0</span> 票</p>
        </header>

        <main>
            <table class="result-table">
                <thead>
                    <tr>
                        <th>選手名</th>
                        <th>平均採点</th>
                    </tr>
                </thead>
                <tbody id="result-tbody">
                    </tbody>
            </table>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
