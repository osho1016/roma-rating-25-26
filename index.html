<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS ROMA 選手採点</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="voter-page" class="page">
        <header>
            <button id="go-admin-btn" onclick="showAdminLogin()">管理者画面</button>
            <h1>AS ROMA PLAYER RATINGS</h1>
            <p>試合のパフォーマンスを10点満点（3.0〜10.0）で採点してください</p>
        </header>

        <main>
            <div id="player-list"></div>

            <button id="submit-btn" onclick="submitRatings()">採点を送信する</button>
        </main>
    </div>

    <div id="admin-login-page" class="page hidden">
        <main>
            <div class="login-box">
                <h2>管理者ログイン</h2>
                <input type="password" id="admin-password" placeholder="パスワードを入力">
                <div class="btn-group">
                    <button onclick="backToVote()">戻る</button>
                    <button onclick="loginAdmin()">ログイン</button>
                </div>
            </div>
        </main>
    </div>

    <div id="admin-view-page" class="page hidden">
        <header>
            <button id="go-admin-btn" onclick="logoutAdmin()">ログアウト</button>
            <h1>投票集計結果</h1>
            <p>現在の総投票数: <span id="total-votes">0</span> 票</p>
        </header>
        <main>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>選手名</th>
                            <th>平均点</th>
                        </tr>
                    </thead>
                    <tbody id="result-tbody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
